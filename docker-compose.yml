version: '3.8'

services:
  # 主应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ancient-script-app
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - COZE_WORKSPACE_PATH=/workspace/projects
      - COZE_WORKLOAD_IDENTITY_API_KEY=${COZE_WORKLOAD_IDENTITY_API_KEY}
      - COZE_INTEGRATION_MODEL_BASE_URL=${COZE_INTEGRATION_MODEL_BASE_URL:-https://api.moonshot.cn/v1}
      - DATABASE_URL=postgresql://ancient_script:${POSTGRES_PASSWORD:-ancient_script_password}@db:5432/ancient_script
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_MESSAGES=${MAX_MESSAGES:-40}
      - MODEL_TEMPERATURE=${MODEL_TEMPERATURE:-0.6}
      - MAX_TOKENS=${MAX_TOKENS:-32768}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-600}
      - DEPLOYMENT_ENV=${DEPLOYMENT_ENV:-development}
    volumes:
      - ./:/workspace/projects
      - ./logs:/workspace/projects/logs
      - ./assets:/workspace/projects/assets
      - ./backups:/workspace/projects/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ancient-script-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: ancient-script-db
    environment:
      - POSTGRES_USER=${DB_USER:-ancient_script}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-ancient_script_password}
      - POSTGRES_DB=${DB_NAME:-ancient_script}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ancient-script-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ancient_script}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ancient-script-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ancient-script-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: ancient-script-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./assets:/var/www/assets:ro
    depends_on:
      - app
    networks:
      - ancient-script-network
    restart: unless-stopped
    profiles:
      - with-nginx

  # Prometheus 监控（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: ancient-script-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - ancient-script-network
    restart: unless-stopped
    profiles:
      - with-monitoring

  # Grafana 可视化（可选）
  grafana:
    image: grafana/grafana:latest
    container_name: ancient-script-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - ancient-script-network
    restart: unless-stopped
    profiles:
      - with-monitoring

  # 数据库备份（可选）
  backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: ancient-script-backup
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${DB_NAME:-ancient_script}
      - POSTGRES_USER=${DB_USER:-ancient_script}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-ancient_script_password}
      - SCHEDULE=@daily  # 每天备份一次
      - BACKUP_KEEP_DAYS=7  # 保留7天的备份
      - BACKUP_KEEP_WEEKS=4  # 保留4周的备份
      - BACKUP_KEEP_MONTHS=6  # 保留6个月的备份
    volumes:
      - ./backups:/backups
    depends_on:
      - db
    networks:
      - ancient-script-network
    restart: unless-stopped
    profiles:
      - with-backup

# 网络配置
networks:
  ancient-script-network:
    driver: bridge

# 数据卷配置
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
