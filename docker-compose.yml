# TCD Origin - Docker Compose 配置文件
# 一键部署跨文明古文字拓扑破译引擎

version: '3.8'

services:
  # ============ API 服务 ============
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tcd-origin-api
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=False
      - LOG_LEVEL=INFO
      # 可选：火山引擎知识库
      # - VOLCENGINE_API_KEY=your_api_key
      # - VOLCENGINE_SERVICE_ID=your_service_id
      # 可选：LLM配置
      # - LLM_API_KEY=your_openai_key
      # - LLM_MODEL=gpt-4
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tcd-network

  # ============ Web 界面 ============
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tcd-origin-web
    ports:
      - "7860:7860"
    command: python web_app.py
    environment:
      - SERVER_NAME=0.0.0.0
      - SERVER_PORT=7860
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - tcd-network

  # ============ Nginx 反向代理（可选）============
  nginx:
    image: nginx:alpine
    container_name: tcd-origin-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - tcd-network
    profiles:
      - with-nginx

networks:
  tcd-network:
    driver: bridge

# 使用方法:
# 
# 基础部署（API + Web）:
#   docker-compose up -d
#
# 完整部署（包含Nginx）:
#   docker-compose --profile with-nginx up -d
#
# 查看日志:
#   docker-compose logs -f
#
# 停止服务:
#   docker-compose down
#
# 重新构建:
#   docker-compose build --no-cache
