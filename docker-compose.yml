version: '3.8'

services:
  # Web应用
  web:
    build: .
    container_name: ancient-text-ai-web
    ports:
      - "8000:8000"
    environment:
      - COZE_WORKLOAD_IDENTITY_API_KEY=${API_KEY}
      - COZE_INTEGRATION_MODEL_BASE_URL=${BASE_URL}
      - COZE_WORKSPACE_PATH=/app
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    volumes:
      - ./data:/app/data
      - ./logs:/app/work/logs
      - ./tmp:/tmp
    restart: unless-stopped
    depends_on:
      - db
      - redis
    networks:
      - ancient-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL数据库（可选）
  db:
    image: postgres:16-alpine
    container_name: ancient-text-ai-db
    environment:
      - POSTGRES_USER=${DB_USER:-ancienttext}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-ancienttext}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ancient-network
    ports:
      - "5432:5432"

  # Redis缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: ancient-text-ai-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ancient-network
    ports:
      - "6379:6379"

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: ancient-text-ai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - ancient-network

volumes:
  postgres_data:
  redis_data:

networks:
  ancient-network:
    driver: bridge
