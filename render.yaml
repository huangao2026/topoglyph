# Render部署配置
services:
  - type: web
    name: ancient-text-ai
    env: python
    plan: free  # 免费版，或选择 starter ($7/月)
    region: singapore  # 选择离用户最近的区域
    
    # 构建配置
    buildCommand: pip install -r requirements.txt
    buildFilter:
      paths:
        - src/
        - config/
        - static/
        - requirements.txt
      ignored:
        - tests/
        - docs/
        - .git/
    
    # 启动命令
    startCommand: uvicorn src.web_api:app --host 0.0.0.0 --port $PORT
    
    # 环境变量
    envVars:
      - key: COZE_WORKLOAD_IDENTITY_API_KEY
        sync: false  # 需要手动设置
      - key: COZE_INTEGRATION_MODEL_BASE_URL
        sync: false  # 需要手动设置
      - key: COZE_WORKSPACE_PATH
        value: /opt/render/project/src
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://ancient-text-ai.onrender.com
    
    # 健康检查
    healthCheckPath: /health
    
    # 自动部署
    autoDeploy: true
    
    # 实例配置
    numInstances: 1
    instanceType: free  # 或 starter ($7/月)
